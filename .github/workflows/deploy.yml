name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid stomping on a deploy in progress. The newer push wins.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin the toolchain — note this overrides rust-toolchain.toml since CI
      # doesn't have the Windows-GNU mingw setup that local dev needs.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache cargo registry + target between runs. ~3-5 min savings on warm runs.
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build (wasm + bundle)
        # --public-url makes asset paths absolute under /Limits/ for project Pages.
        run: trunk build --release --public-url /Limits/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
